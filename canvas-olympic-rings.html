<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas 绘制奥运五环</title>
    <style>
      .canvas-panel {
        border: 1px solid #c3c3c3;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas-olympic-rings" class="canvas-panel">
      Your browser does not support canvas element.
    </canvas>
    <script type="text/javascript">
      /**
       * @typedef {Object} OlympicRingColors
       * @property {string} blue 蓝色环颜色。
       * @property {string} black 黑色环颜色。
       * @property {string} red 红色环颜色。
       * @property {string} yellow 黄色环颜色。
       * @property {string} green 绿色环颜色。
       */

      /**
       * @typedef {Object} OlympicRingsOptions
       * @property {number} [x=0] 五环整体距离画布左侧的偏移量。
       * @property {number} [y=0] 五环整体距离画布顶部的偏移量。
       * @property {number} [innerRadius=40] 基础内圈半径，所有比例都基于这个值计算。
       * @property {number} [innerRadiusRatio=1] 内圈半径比例。
       * @property {number} [outerRadiusRatio=1.2] 外圈半径比例。
       * @property {number} [horizontalGapRatio=2.6] 相邻圆环圆心水平距离比例。
       * @property {number} [verticalGapRatio=1.1] 上下两排圆环圆心垂直距离比例。
       * @property {string} [backgroundColor="#ffffff"] 画布背景色。
       * @property {Partial<OlympicRingColors>} [colors] 五个圆环的颜色配置。
       */

      /**
       * @typedef {Object} OlympicRing
       * @property {string} name 圆环名称。
       * @property {string} color 圆环颜色。
       * @property {number} x 圆心 X 坐标。
       * @property {number} y 圆心 Y 坐标。
       * @property {number} radius Canvas 描边圆弧使用的中心线半径。
       * @property {number} innerRadius 圆环内圈半径。
       * @property {number} outerRadius 圆环外圈半径。
       */

      /**
       * @typedef {Object} OlympicRingsParams
       * @property {number} x 五环整体距离画布左侧的偏移量。
       * @property {number} y 五环整体距离画布顶部的偏移量。
       * @property {number} innerRadius 圆环内圈半径。
       * @property {number} outerRadius 圆环外圈半径。
       * @property {number} lineRadius Canvas 描边圆弧使用的中心线半径。
       * @property {number} lineWidth Canvas 描边线宽。
       * @property {number} horizontalGap 相邻圆环圆心水平距离。
       * @property {number} verticalGap 上下两排圆环圆心垂直距离。
       * @property {string} backgroundColor 画布背景色。
       * @property {OlympicRing[]} rings 计算完成后的五个圆环参数。
       * @property {function(string|number, string): OlympicRingsParams} setRingColor 设置单个圆环颜色。
       * @property {function(Partial<OlympicRingColors>): OlympicRingsParams} setRingColors 批量设置圆环颜色。
       * @property {function(string): OlympicRingsParams} setAllRingColor 设置所有圆环为同一种颜色。
       * @property {function(string): OlympicRingsParams} setBackgroundColor 设置画布背景色。
       * @property {function(HTMLCanvasElement|CanvasRenderingContext2D): OlympicRingsParams} draw 重新绘制五环。
       */

      /**
       * 根据偏移量、半径和比例计算奥运五环参数，并使用 Canvas 进行绘制。
       */
      class OlympicRings {
        /**
         * 创建奥运五环绘制器。
         *
         * @param {OlympicRingsOptions} [options] 五环绘制配置。
         */
        constructor(options) {
          const defaults = {
            x: 15,
            y: 20,
            innerRadius: 40,
            innerRadiusRatio: 1,
            outerRadiusRatio: 1.2,
            horizontalGapRatio: 2.6,
            verticalGapRatio: 1.1,
            backgroundColor: "#ffffff",
            colors: {
              blue: "#0085C7",
              black: "#000000",
              red: "#DF0024",
              yellow: "#F4C300",
              green: "#009F3D",
            },
          };

          this.options = Object.assign({}, defaults, options);
          this.options.colors = Object.assign({}, defaults.colors, options && options.colors);
          this.ringNames = ["blue", "black", "red", "yellow", "green"];
        }

        /**
         * 获取按比例计算后的内圈半径。
         *
         * @returns {number} 内圈半径。
         */
        get innerRadius() {
          return this.options.innerRadius * this.options.innerRadiusRatio;
        }

        /**
         * 获取按比例计算后的外圈半径。
         *
         * @returns {number} 外圈半径。
         */
        get outerRadius() {
          return this.options.innerRadius * this.options.outerRadiusRatio;
        }

        /**
         * 获取 Canvas arc 绘制时使用的中心线半径。
         *
         * @returns {number} 描边中心线半径。
         */
        get lineRadius() {
          return (this.innerRadius + this.outerRadius) / 2;
        }

        /**
         * 获取 Canvas 描边线宽。
         *
         * @returns {number} 描边线宽。
         */
        get lineWidth() {
          return this.outerRadius - this.innerRadius;
        }

        /**
         * 获取相邻圆环圆心的水平距离。
         *
         * @returns {number} 水平圆心距。
         */
        get horizontalGap() {
          return this.options.innerRadius * this.options.horizontalGapRatio;
        }

        /**
         * 获取上下两排圆环圆心的垂直距离。
         *
         * @returns {number} 垂直圆心距。
         */
        get verticalGap() {
          return this.options.innerRadius * this.options.verticalGapRatio;
        }

        /**
         * 按奥运五环布局比例计算五个圆环的位置和尺寸。
         *
         * @returns {OlympicRing[]} 五个圆环的参数列表。
         */
        getRings() {
          const startX = this.options.x + this.outerRadius;
          const startY = this.options.y + this.outerRadius;
          const middleOffsetX = this.horizontalGap / 2;

          return [
            this.createRing("blue", startX, startY),
            this.createRing("black", startX + this.horizontalGap, startY),
            this.createRing("red", startX + this.horizontalGap * 2, startY),
            this.createRing("yellow", startX + middleOffsetX, startY + this.verticalGap),
            this.createRing("green", startX + this.horizontalGap + middleOffsetX, startY + this.verticalGap),
          ];
        }

        /**
         * 设置单个圆环颜色。
         *
         * @param {string|number} ringNameOrIndex 圆环名称，或圆环索引：0 蓝、1 黑、2 红、3 黄、4 绿。
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setRingColor(ringNameOrIndex, color) {
          const ringName = typeof ringNameOrIndex === "number" ? this.ringNames[ringNameOrIndex] : ringNameOrIndex;

          if (this.options.colors[ringName]) {
            this.options.colors[ringName] = color;
          }

          return this;
        }

        /**
         * 批量设置圆环颜色。
         *
         * @param {Partial<OlympicRingColors>} colors 需要覆盖的圆环颜色。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setRingColors(colors) {
          Object.keys(colors).forEach((ringName) => {
            this.setRingColor(ringName, colors[ringName]);
          });

          return this;
        }

        /**
         * 设置所有圆环为同一种颜色。
         *
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setAllRingColor(color) {
          this.ringNames.forEach((ringName) => {
            this.options.colors[ringName] = color;
          });

          return this;
        }

        /**
         * 设置画布背景色。
         *
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setBackgroundColor(color) {
          this.options.backgroundColor = color;
          return this;
        }

        /**
         * 根据当前五环尺寸自动调整画布大小。
         *
         * @param {HTMLCanvasElement} canvas 需要调整尺寸的 canvas 元素。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        resizeCanvas(canvas) {
          const params = this.getParams();
          const maxX = Math.max.apply(
            null,
            params.rings.map((ring) => ring.x + params.outerRadius),
          );
          const maxY = Math.max.apply(
            null,
            params.rings.map((ring) => ring.y + params.outerRadius),
          );

          canvas.width = Math.ceil(maxX + this.options.x);
          canvas.height = Math.ceil(maxY + this.options.y);
          return this;
        }

        /**
         * 绘制奥运五环，并返回本次绘制使用的参数对象。
         *
         * @param {HTMLCanvasElement|CanvasRenderingContext2D} canvasOrContext canvas 元素或 2D 绘图上下文。
         * @returns {OlympicRingsParams} 本次绘制使用的五环参数。
         */
        draw(canvasOrContext) {
          const ctx = canvasOrContext.getContext ? canvasOrContext.getContext("2d") : canvasOrContext;
          const canvas = ctx.canvas;
          const params = this.getParams();

          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = params.backgroundColor;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.lineWidth = params.lineWidth;
          ctx.lineCap = "round";

          params.rings.forEach((ring) => this.drawArc(ctx, ring, 0, Math.PI * 2));
          this.drawInterlacedArcs(ctx, params.rings);

          return params;
        }

        /**
         * 创建单个圆环的参数对象。
         *
         * @param {string} name 圆环名称。
         * @param {number} x 圆心 X 坐标。
         * @param {number} y 圆心 Y 坐标。
         * @returns {OlympicRing} 单个圆环参数。
         */
        createRing(name, x, y) {
          return {
            name: name,
            color: this.options.colors[name],
            x: x,
            y: y,
            radius: this.lineRadius,
            innerRadius: this.innerRadius,
            outerRadius: this.outerRadius,
          };
        }

        /**
         * 绘制指定圆环的一段圆弧。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing} ring 圆环参数。
         * @param {number} startAngle 起始角度，单位为弧度。
         * @param {number} endAngle 结束角度，单位为弧度。
         * @returns {void}
         */
        drawArc(ctx, ring, startAngle, endAngle) {
          ctx.strokeStyle = ring.color;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.radius, startAngle, endAngle, false);
          ctx.stroke();
        }

        /**
         * 补画局部弧线，形成五环相互交错的视觉效果。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing[]} rings 五个圆环的参数列表。
         * @returns {void}
         */
        drawInterlacedArcs(ctx, rings) {
          const ringMap = rings.reduce((map, ring) => {
            map[ring.name] = ring;
            return map;
          }, {});

          [
            { name: "blue", start: 1.9, end: 2.1 },
            { name: "black", start: 0.5, end: 0.6 },
            { name: "black", start: 1.9, end: 2.1 },
            { name: "red", start: 0.5, end: 0.6 },
          ].forEach((arc) => {
            this.drawArc(ctx, ringMap[arc.name], Math.PI * arc.start, Math.PI * arc.end);
          });
        }
      }

      const canvas1 = document.getElementById("canvas-olympic-rings");
      const olympicRings = new OlympicRings({
        x: 0,
        y: 0,
        innerRadius: 60,
      });

      olympicRings.resizeCanvas(canvas1);
      const olympicRingsParams = olympicRings.draw(canvas1);

      // 可扩展调用示例：
      // olympicRings.setAllRingColor("#0085C7").setBackgroundColor("#f7f7f7").draw(canvas1);
      // olympicRings.setRingColor("green", "#00a651").draw(canvas1);
      console.log(olympicRingsParams);
    </script>
  </body>
</html>
