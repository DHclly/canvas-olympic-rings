<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas 绘制奥运五环</title>
    <style>
      .canvas-panel {
        border: 1px solid #c3c3c3;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas-olympic-rings" class="canvas-panel">
      Your browser does not support canvas element.
    </canvas>
    <script type="text/javascript">
      /**
       * @typedef {Object} OlympicRingColors
       * @property {string} blue 蓝色环颜色。
       * @property {string} black 黑色环颜色。
       * @property {string} red 红色环颜色。
       * @property {string} yellow 黄色环颜色。
       * @property {string} green 绿色环颜色。
       */

      /**
       * @typedef {Object} OlympicRingsOptions
       * @property {number} [x=10] 五环整体距离画布左侧的偏移量。
       * @property {number} [y=10] 五环整体距离画布顶部的偏移量。
       * @property {number} [innerRadius=40] 基础内圈半径，所有比例都基于这个值计算。
       * @property {number} [innerRadiusRatio=1] 内圈半径比例。
       * @property {number} [outerRadiusRatio=1.2] 外圈半径比例。
       * @property {number} [horizontalGapRatio=2.6] 相邻圆环圆心水平距离比例。
       * @property {number} [verticalGapRatio=1.1] 上下两排圆环圆心垂直距离比例。
       * @property {string} [backgroundColor="#ffffff"] 画布背景色。
       * @property {Partial<OlympicRingColors>} [colors] 五个圆环的颜色配置。
       */

      /**
       * @typedef {Object} OlympicRing
       * @property {string} name 圆环名称。
       * @property {string} color 圆环颜色。
       * @property {number} x 圆心 X 坐标。
       * @property {number} y 圆心 Y 坐标。
       * @property {number} radius Canvas 描边圆弧使用的中心线半径。
       * @property {number} innerRadius 圆环内圈半径。
       * @property {number} outerRadius 圆环外圈半径。
       */

      /**
       * @typedef {Object} OlympicRingsParams
       * @property {number} x 五环整体距离画布左侧的偏移量。
       * @property {number} y 五环整体距离画布顶部的偏移量。
       * @property {number} innerRadius 圆环内圈半径。
       * @property {number} outerRadius 圆环外圈半径。
       * @property {number} lineRadius Canvas 描边圆弧使用的中心线半径。
       * @property {number} lineWidth Canvas 描边线宽。
       * @property {number} horizontalGap 相邻圆环圆心水平距离。
       * @property {number} verticalGap 上下两排圆环圆心垂直距离。
       * @property {string} backgroundColor 画布背景色。
       * @property {OlympicRing[]} rings 计算完成后的五个圆环参数。
       */

      /**
       * 根据偏移量、半径和比例计算奥运五环参数，并使用 Canvas 进行绘制。
       */
      class OlympicRings {
        static defaultOptions = {
          x: 10,
          y: 10,
          innerRadius: 40,
          innerRadiusRatio: 1,
          outerRadiusRatio: 1.2,
          horizontalGapRatio: 2.6,
          verticalGapRatio: 1.1,
          backgroundColor: "#ffffff",
          colors: {
            blue: "#0085C7",
            black: "#000000",
            red: "#DF0024",
            yellow: "#F4C300",
            green: "#009F3D",
          },
        };

        static ringNames = ["blue", "black", "red", "yellow", "green"];

        /**
         * 创建奥运五环绘制器。
         *
         * @param {OlympicRingsOptions} [options] 五环绘制配置。
         */
        constructor(options = {}) {
          this.options = {
            ...OlympicRings.defaultOptions,
            ...options,
            colors: {
              ...OlympicRings.defaultOptions.colors,
              ...options.colors,
            },
          };

          this.ringNames = OlympicRings.ringNames;
        }

        /**
         * 获取按比例计算后的内圈半径。
         *
         * @returns {number} 内圈半径。
         */
        get innerRadius() {
          return this.options.innerRadius * this.options.innerRadiusRatio;
        }

        /**
         * 获取按比例计算后的外圈半径。
         *
         * @returns {number} 外圈半径。
         */
        get outerRadius() {
          return this.options.innerRadius * this.options.outerRadiusRatio;
        }

        /**
         * 获取 Canvas arc 绘制时使用的中心线半径。
         *
         * @returns {number} 描边中心线半径。
         */
        get lineRadius() {
          return (this.innerRadius + this.outerRadius) / 2;
        }

        /**
         * 获取 Canvas 描边线宽。
         *
         * @returns {number} 描边线宽。
         */
        get lineWidth() {
          return this.outerRadius - this.innerRadius;
        }

        /**
         * 获取相邻圆环圆心的水平距离。
         *
         * @returns {number} 水平圆心距。
         */
        get horizontalGap() {
          return this.options.innerRadius * this.options.horizontalGapRatio;
        }

        /**
         * 获取上下两排圆环圆心的垂直距离。
         *
         * @returns {number} 垂直圆心距。
         */
        get verticalGap() {
          return this.options.innerRadius * this.options.verticalGapRatio;
        }

        /**
         * 按奥运五环布局比例计算五个圆环的位置和尺寸。
         *
         * @returns {OlympicRing[]} 五个圆环的参数列表。
         */
        getRings() {
          const startX = this.options.x + this.outerRadius;
          const startY = this.options.y + this.outerRadius;
          const middleOffsetX = this.horizontalGap / 2;

          return [
            this.createRing("blue", startX, startY),
            this.createRing("black", startX + this.horizontalGap, startY),
            this.createRing("red", startX + this.horizontalGap * 2, startY),
            this.createRing(
              "yellow",
              startX + middleOffsetX,
              startY + this.verticalGap,
            ),
            this.createRing(
              "green",
              startX + this.horizontalGap + middleOffsetX,
              startY + this.verticalGap,
            ),
          ];
        }

        /**
         * 设置单个圆环颜色。
         *
         * @param {string|number} ringNameOrIndex 圆环名称，或圆环索引：0 蓝、1 黑、2 红、3 黄、4 绿。
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setRingColor(ringNameOrIndex, color) {
          const ringName =
            typeof ringNameOrIndex === "number"
              ? this.ringNames[ringNameOrIndex]
              : ringNameOrIndex;

          if (this.options.colors[ringName]) {
            this.options.colors[ringName] = color;
          }

          return this;
        }

        /**
         * 批量设置圆环颜色。
         *
         * @param {Partial<OlympicRingColors>} colors 需要覆盖的圆环颜色。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setRingColors(colors) {
          Object.entries(colors).forEach(([ringName, color]) =>
            this.setRingColor(ringName, color),
          );

          return this;
        }

        /**
         * 设置所有圆环为同一种颜色。
         *
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setAllRingColor(color) {
          this.ringNames.forEach((ringName) => {
            this.options.colors[ringName] = color;
          });

          return this;
        }

        /**
         * 设置画布背景色。
         *
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setBackgroundColor(color) {
          this.options.backgroundColor = color;
          return this;
        }

        /**
         * 根据当前五环尺寸自动调整画布大小。
         *
         * @param {HTMLCanvasElement} canvas 需要调整尺寸的 canvas 元素。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        resizeCanvas(canvas) {
          const rings = this.getRings();
          // 分别找到所有圆环中最大的圆心 X 和最大的圆心 Y；它们不一定来自同一个圆环。
          const maxCenterX = Math.max(...rings.map((ring) => ring.x));
          const maxCenterY = Math.max(...rings.map((ring) => ring.y));

          // 宽度用最大圆心 X 计算，高度用最大圆心 Y 计算，再分别加上外圈半径和右侧/底部留白。
          canvas.width = Math.ceil(maxCenterX + this.outerRadius + this.options.x);
          canvas.height = Math.ceil(maxCenterY + this.outerRadius + this.options.y);
          return this;
        }

        /**
         * 绘制奥运五环。
         *
         * @param {HTMLCanvasElement} canvas canvas 元素。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        draw(canvas) {
          const context = canvas.getContext("2d");

          context.clearRect(0, 0, canvas.width, canvas.height);
          context.fillStyle = this.options.backgroundColor;
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.lineWidth = this.lineWidth;
          context.lineCap = "round";

          const rings = this.getRings();
          rings.forEach((ring) => this.drawArc(context, ring, 0, Math.PI * 2));
          this.drawInterlacedArcs(context, rings);

          return this;
        }

        /**
         * 创建单个圆环的参数对象。
         *
         * @param {string} name 圆环名称。
         * @param {number} x 圆心 X 坐标。
         * @param {number} y 圆心 Y 坐标。
         * @returns {OlympicRing} 单个圆环参数。
         */
        createRing(name, x, y) {
          return {
            name,
            color: this.options.colors[name],
            x,
            y,
            radius: this.lineRadius,
            innerRadius: this.innerRadius,
            outerRadius: this.outerRadius,
          };
        }

        /**
         * 绘制指定圆环的一段圆弧。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing} ring 圆环参数。
         * @param {number} startAngle 起始角度，单位为弧度。
         * @param {number} endAngle 结束角度，单位为弧度。
         * @returns {void}
         */
        drawArc(ctx, ring, startAngle, endAngle) {
          ctx.strokeStyle = ring.color;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.radius, startAngle, endAngle, false);
          ctx.stroke();
        }

        /**
         * 根据两个圆的交点，计算第一个圆上两个交点对应的角度。
         *
         * @param {OlympicRing} ring 圆环参数。
         * @param {OlympicRing} otherRing 与它相交的另一个圆环参数。
         * @returns {{ angle: number, x: number, y: number }[]} 两个交点在 ring 上对应的角度和坐标。
         */
        getIntersectionAngles(ring, otherRing) {
          const dx = otherRing.x - ring.x;
          const dy = otherRing.y - ring.y;
          const distance = Math.hypot(dx, dy);
          const radius = ring.radius;

          // 如果两个圆没有相交，或者圆心完全重合，就没有可用于补画的交点。
          if (distance === 0 || distance > radius * 2) {
            return [];
          }

          // 两个圆心连线的方向角。可以理解为：从 ring 圆心看向 otherRing 圆心的角度。
          const baseAngle = Math.atan2(dy, dx);

          // 两个圆半径相同，所以两个交点会对称分布在圆心连线两侧。
          // distance / 2 是圆心到“两个交点连线中点”的距离。
          // 用 cos(夹角) = 邻边 / 斜边 = (distance / 2) / radius，反推出夹角。
          const offsetAngle = Math.acos(distance / (2 * radius));

          // 第一个交点角度 = 圆心连线方向角 + 夹角；第二个交点角度 = 圆心连线方向角 - 夹角。
          return [baseAngle + offsetAngle, baseAngle - offsetAngle].map((angle) => ({
            angle,
            // 角度转回坐标，方便后面按交点位置选择到底补画哪一个交点附近的弧。
            x: ring.x + Math.cos(angle) * radius,
            y: ring.y + Math.sin(angle) * radius,
          }));
        }

        /**
         * 从两个交点里选择需要补画的那个交点角度。
         *
         * @param {OlympicRing} upperRing 需要压在上面的圆环。
         * @param {OlympicRing} lowerRing 被压在下面的圆环。
         * @param {"upper"|"lower"} pointPosition 选择更靠上的交点，还是更靠下的交点。
         * @returns {number|null} 需要补画的交点角度，单位为弧度；没有交点时返回 null。
         */
        getInterlacedArcAngle(upperRing, lowerRing, pointPosition) {
          const intersections = this.getIntersectionAngles(upperRing, lowerRing);

          if (intersections.length === 0) {
            return null;
          }

          // Canvas 的 y 轴向下，所以 y 更小表示位置更靠上，y 更大表示位置更靠下。
          // 每组交错关系显式指定使用 upper 还是 lower，避免靠左右位置猜测导致黑绿这类交点选错。
          return intersections.toSorted((pointA, pointB) =>
            pointPosition === "upper" ? pointA.y - pointB.y : pointB.y - pointA.y,
          )[0].angle;
        }

        /**
         * 在两个圆环交点附近补画一小段上层圆环，形成相互交错的视觉效果。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing} upperRing 需要压在上面的圆环。
         * @param {OlympicRing} lowerRing 被压在下面的圆环。
         * @param {"upper"|"lower"} pointPosition 选择更靠上的交点，还是更靠下的交点。
         * @returns {void}
         */
        drawInterlacedArc(ctx, upperRing, lowerRing, pointPosition) {
          const angle = this.getInterlacedArcAngle(upperRing, lowerRing, pointPosition);

          if (angle === null) {
            return;
          }

          // 补画弧线只应该覆盖当前交点附近，不能太长。
          // lineWidth / lineRadius 可以把线宽粗略换算成角度范围；
          // 乘以 0.75 让弧段略宽于交点本身，但再用 0.18 作为上限，
          // 避免“黑压黄”的补画弧线延伸到旁边的黑绿交点。
          const anglePadding = Math.min(
            0.18,
            Math.max(0.08, (this.lineWidth / this.lineRadius) * 0.75),
          );

          this.drawArc(ctx, upperRing, angle - anglePadding, angle + anglePadding);
        }

        /**
         * 补画局部弧线，形成五环相互交错的视觉效果。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing[]} rings 五个圆环的参数列表。
         * @returns {void}
         */
        drawInterlacedArcs(ctx, rings) {
          const ringMap = Object.fromEntries(
            rings.map((ring) => [ring.name, ring]),
          );

          [
            // 完整圆环按 blue -> black -> red -> yellow -> green 绘制，
            // 所以下排的 yellow/green 默认已经盖住了上排圆环。
            // 这里只补画 4 个“上排圆环需要反过来盖住下排圆环”的交点。
            //
            // 每一项表示：在指定交点附近，upperRingName 这个环要盖在 lowerRingName 上面。
            // pointPosition 不是颜色含义，而是两个圆交点的空间位置：upper 表示更靠上的交点，lower 表示更靠下的交点。
            { upperRingName: "blue", lowerRingName: "yellow", pointPosition: "upper" },
            { upperRingName: "black", lowerRingName: "yellow", pointPosition: "lower" },
            { upperRingName: "black", lowerRingName: "green", pointPosition: "upper" },
            { upperRingName: "red", lowerRingName: "green", pointPosition: "lower" },
          ].forEach(({ upperRingName, lowerRingName, pointPosition }) => {
            this.drawInterlacedArc(
              ctx,
              ringMap[upperRingName],
              ringMap[lowerRingName],
              pointPosition,
            );
          });
        }
      }

      const canvas1 = document.getElementById("canvas-olympic-rings");
      const olympicRings = new OlympicRings({
        x:25,
        y:25,
        innerRadius:100
      });

      olympicRings.resizeCanvas(canvas1);
      olympicRings.draw(canvas1);

      // 可扩展调用示例：
      // olympicRings.setAllRingColor("#0085C7").setBackgroundColor("#f7f7f7").draw(canvas1);
      // olympicRings.setRingColor("green", "#00a651").draw(canvas1);
      console.log(olympicRings.getRings());
    </script>
  </body>
</html>
