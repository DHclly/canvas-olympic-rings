<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas 绘制奥运五环</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f5f7fa;
      }

      .canvas-panel {
        border: 1px solid #c3c3c3;
        background: #ffffff;
        max-width: calc(100vw - 48px);
        height: auto;
      }

      .control-panel {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 10;
        width: min(340px, calc(100vw - 48px));
        max-height: calc(100vh - 48px);
        border: 1px solid #d4d8df;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 16px 48px rgba(28, 35, 48, 0.18);
        overflow: hidden;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
        will-change: transform;
      }

      .control-panel.is-collapsed {
        transform: translateX(calc(100% - 44px));
        box-shadow: 0 8px 24px rgba(28, 35, 48, 0.14);
      }

      .control-panel__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 44px;
        padding: 0 10px 0 14px;
        border-bottom: 1px solid #e5e8ee;
        background: #ffffff;
      }

      .control-panel__title {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        color: #1f2937;
        transition: opacity 160ms ease;
      }

      .control-panel.is-collapsed .control-panel__title {
        opacity: 0;
      }

      .icon-button {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 32px;
        height: 32px;
        border: 1px solid #d4d8df;
        border-radius: 6px;
        background: #ffffff;
        color: #374151;
        cursor: pointer;
        transition:
          background-color 140ms ease,
          border-color 140ms ease;
      }

      .icon-button:hover {
        border-color: #9ca3af;
        background: #f3f4f6;
      }

      .control-panel.is-collapsed .icon-button {
        position: absolute;
        top: 6px;
        left: 6px;
      }

      .control-panel__body {
        max-height: calc(100vh - 94px);
        padding: 12px 14px 0;
        overflow: auto;
        transition:
          opacity 160ms ease,
          visibility 160ms ease;
      }

      .control-panel.is-collapsed .control-panel__body {
        opacity: 0;
        visibility: hidden;
      }

      .control-group {
        margin: 0 0 14px;
        padding: 0 0 12px;
        border: 0;
        border-bottom: 1px solid #e5e8ee;
      }

      .control-group:last-of-type {
        margin-bottom: 0;
        border-bottom: 0;
      }

      .control-group legend {
        padding: 0 0 8px;
        font-size: 13px;
        font-weight: 650;
        color: #374151;
      }

      .control-row {
        display: grid;
        grid-template-columns: 88px 1fr 72px;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 12px;
        color: #4b5563;
      }

      .control-row--color {
        grid-template-columns: 88px 44px 1fr;
      }

      .control-row input[type="range"] {
        width: 100%;
      }

      .control-row input[type="number"],
      .control-row input[type="text"] {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
        padding: 5px 6px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font: inherit;
      }

      .control-row input[type="color"] {
        width: 36px;
        height: 30px;
        padding: 2px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #ffffff;
      }

      .control-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }

      .control-actions {
        position: sticky;
        bottom: 0;
        display: flex;
        gap: 8px;
        margin: 0 -14px;
        padding: 10px 14px 22px;
        border-top: 1px solid #e5e8ee;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 -8px 16px rgba(255, 255, 255, 0.92);
      }

      .control-button {
        flex: 1;
        height: 34px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2937;
        font: inherit;
        cursor: pointer;
      }

      .control-button:hover {
        background: #f3f4f6;
      }

      @media (prefers-reduced-motion: reduce) {
        .control-panel,
        .control-panel__body,
        .icon-button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas-olympic-rings" class="canvas-panel">
      Your browser does not support canvas element.
    </canvas>
    <aside
      id="rings-control-panel"
      class="control-panel"
      aria-label="奥运五环控制面板"
    >
      <div class="control-panel__header">
        <h2 class="control-panel__title">五环参数</h2>
        <button
          id="toggle-panel"
          class="icon-button"
          type="button"
          aria-label="折叠控制面板"
        >
          ›
        </button>
      </div>
      <form id="rings-control-form" class="control-panel__body">
        <fieldset class="control-group">
          <legend>布局</legend>
          <label class="control-row">
            <span>X</span>
            <input name="x" type="range" min="0" max="160" step="1" />
            <input name="xNumber" type="number" min="0" max="160" step="1" />
          </label>
          <label class="control-row">
            <span>Y</span>
            <input name="y" type="range" min="0" max="160" step="1" />
            <input name="yNumber" type="number" min="0" max="160" step="1" />
          </label>
        </fieldset>

        <fieldset class="control-group">
          <legend>尺寸比例</legend>
          <label class="control-row">
            <span>内圈半径</span>
            <input
              name="innerRadius"
              type="range"
              min="10"
              max="140"
              step="1"
            />
            <input
              name="innerRadiusNumber"
              type="number"
              min="10"
              max="140"
              step="1"
            />
          </label>
          <label class="control-row">
            <span>内圈比例</span>
            <input
              name="innerRadiusRatio"
              type="range"
              min="0.5"
              max="1.5"
              step="0.01"
            />
            <input
              name="innerRadiusRatioNumber"
              type="number"
              min="0.5"
              max="1.5"
              step="0.01"
            />
          </label>
          <label class="control-row">
            <span>外圈比例</span>
            <input
              name="outerRadiusRatio"
              type="range"
              min="1.01"
              max="1.8"
              step="0.01"
            />
            <input
              name="outerRadiusRatioNumber"
              type="number"
              min="1.01"
              max="1.8"
              step="0.01"
            />
          </label>
          <label class="control-row">
            <span>水平距离</span>
            <input
              name="horizontalGapRatio"
              type="range"
              min="1.4"
              max="3.6"
              step="0.01"
            />
            <input
              name="horizontalGapRatioNumber"
              type="number"
              min="1.4"
              max="3.6"
              step="0.01"
            />
          </label>
          <label class="control-row">
            <span>垂直距离</span>
            <input
              name="verticalGapRatio"
              type="range"
              min="0.2"
              max="2"
              step="0.01"
            />
            <input
              name="verticalGapRatioNumber"
              type="number"
              min="0.2"
              max="2"
              step="0.01"
            />
          </label>
        </fieldset>

        <fieldset class="control-group">
          <legend>颜色</legend>
          <label class="control-row control-row--color">
            <span>背景</span>
            <input name="backgroundColor" type="color" />
            <input name="backgroundColorText" type="text" />
          </label>
          <label class="control-row control-row--color">
            <span>蓝环</span>
            <input name="blue" type="color" />
            <input name="blueText" type="text" />
          </label>
          <label class="control-row control-row--color">
            <span>黑环</span>
            <input name="black" type="color" />
            <input name="blackText" type="text" />
          </label>
          <label class="control-row control-row--color">
            <span>红环</span>
            <input name="red" type="color" />
            <input name="redText" type="text" />
          </label>
          <label class="control-row control-row--color">
            <span>黄环</span>
            <input name="yellow" type="color" />
            <input name="yellowText" type="text" />
          </label>
          <label class="control-row control-row--color">
            <span>绿环</span>
            <input name="green" type="color" />
            <input name="greenText" type="text" />
          </label>
          <label class="control-row control-row--color">
            <span>统一颜色</span>
            <input name="allRingsColor" type="color" value="#0085c7" />
            <button id="apply-all-color" class="control-button" type="button">
              应用
            </button>
          </label>
        </fieldset>

        <fieldset class="control-group">
          <legend>调试</legend>
          <label class="control-row control-row--color">
            <span>补画颜色</span>
            <input name="debugEnabled" type="checkbox" />
            <input name="debugInterlacedColor" type="color" value="#ff69b4" />
          </label>
        </fieldset>

        <div class="control-actions">
          <button id="reset-controls" class="control-button" type="button">
            重置
          </button>
        </div>
      </form>
    </aside>
    <script type="text/javascript">
      /**
       * @typedef {Object} OlympicRingColors
       * @property {string} blue 蓝色环颜色。
       * @property {string} black 黑色环颜色。
       * @property {string} red 红色环颜色。
       * @property {string} yellow 黄色环颜色。
       * @property {string} green 绿色环颜色。
       */

      /**
       * @typedef {Object} OlympicRingsOptions
       * @property {number} [x=10] 五环整体距离画布左侧的偏移量。
       * @property {number} [y=10] 五环整体距离画布顶部的偏移量。
       * @property {number} [innerRadius=40] 基础内圈半径，所有比例都基于这个值计算。
       * @property {number} [innerRadiusRatio=1] 内圈半径比例。
       * @property {number} [outerRadiusRatio=1.2] 外圈半径比例。
       * @property {number} [horizontalGapRatio=2.6] 相邻圆环圆心水平距离比例。
       * @property {number} [verticalGapRatio=1.1] 上下两排圆环圆心垂直距离比例。
       * @property {string} [backgroundColor="#ffffff"] 画布背景色。
       * @property {string|null} [debugInterlacedColor=null] 交错补画弧线的调试颜色；为 null 时使用圆环原色。
       * @property {Partial<OlympicRingColors>} [colors] 五个圆环的颜色配置。
       */

      /**
       * @typedef {Object} OlympicRing
       * @property {string} name 圆环名称。
       * @property {string} color 圆环颜色。
       * @property {number} x 圆心 X 坐标。
       * @property {number} y 圆心 Y 坐标。
       * @property {number} radius Canvas 描边圆弧使用的中心线半径。
       * @property {number} innerRadius 圆环内圈半径。
       * @property {number} outerRadius 圆环外圈半径。
       */

      /**
       * @typedef {Object} OlympicRingsParams
       * @property {number} x 五环整体距离画布左侧的偏移量。
       * @property {number} y 五环整体距离画布顶部的偏移量。
       * @property {number} innerRadius 圆环内圈半径。
       * @property {number} outerRadius 圆环外圈半径。
       * @property {number} lineRadius Canvas 描边圆弧使用的中心线半径。
       * @property {number} lineWidth Canvas 描边线宽。
       * @property {number} horizontalGap 相邻圆环圆心水平距离。
       * @property {number} verticalGap 上下两排圆环圆心垂直距离。
       * @property {string} backgroundColor 画布背景色。
       * @property {OlympicRing[]} rings 计算完成后的五个圆环参数。
       */

      /**
       * 根据偏移量、半径和比例计算奥运五环参数，并使用 Canvas 进行绘制。
       */
      class OlympicRings {
        static defaultOptions = {
          x: 10,
          y: 10,
          innerRadius: 40,
          innerRadiusRatio: 1,
          outerRadiusRatio: 1.2,
          horizontalGapRatio: 2.6,
          verticalGapRatio: 1.1,
          backgroundColor: "#ffffff",
          debugInterlacedColor: null,
          colors: {
            blue: "#0085C7",
            black: "#000000",
            red: "#DF0024",
            yellow: "#F4C300",
            green: "#009F3D",
          },
        };

        static ringNames = ["blue", "black", "red", "yellow", "green"];

        /**
         * 创建奥运五环绘制器。
         *
         * @param {OlympicRingsOptions} [options] 五环绘制配置。
         */
        constructor(options = {}) {
          this.options = {
            ...OlympicRings.defaultOptions,
            ...options,
            colors: {
              ...OlympicRings.defaultOptions.colors,
              ...options.colors,
            },
          };

          this.ringNames = OlympicRings.ringNames;
        }

        /**
         * 获取按比例计算后的内圈半径。
         *
         * @returns {number} 内圈半径。
         */
        get innerRadius() {
          return this.options.innerRadius * this.options.innerRadiusRatio;
        }

        /**
         * 获取按比例计算后的外圈半径。
         *
         * @returns {number} 外圈半径。
         */
        get outerRadius() {
          return this.options.innerRadius * this.options.outerRadiusRatio;
        }

        /**
         * 获取 Canvas arc 绘制时使用的中心线半径。
         *
         * @returns {number} 描边中心线半径。
         */
        get lineRadius() {
          return (this.innerRadius + this.outerRadius) / 2;
        }

        /**
         * 获取 Canvas 描边线宽。
         *
         * @returns {number} 描边线宽。
         */
        get lineWidth() {
          return this.outerRadius - this.innerRadius;
        }

        /**
         * 获取相邻圆环圆心的水平距离。
         *
         * @returns {number} 水平圆心距。
         */
        get horizontalGap() {
          return this.options.innerRadius * this.options.horizontalGapRatio;
        }

        /**
         * 获取上下两排圆环圆心的垂直距离。
         *
         * @returns {number} 垂直圆心距。
         */
        get verticalGap() {
          return this.options.innerRadius * this.options.verticalGapRatio;
        }

        /**
         * 按奥运五环布局比例计算五个圆环的位置和尺寸。
         *
         * @returns {OlympicRing[]} 五个圆环的参数列表。
         */
        getRings() {
          const startX = this.options.x + this.outerRadius;
          const startY = this.options.y + this.outerRadius;
          const middleOffsetX = this.horizontalGap / 2;

          return [
            this.createRing("blue", startX, startY),
            this.createRing("black", startX + this.horizontalGap, startY),
            this.createRing("red", startX + this.horizontalGap * 2, startY),
            this.createRing(
              "yellow",
              startX + middleOffsetX,
              startY + this.verticalGap,
            ),
            this.createRing(
              "green",
              startX + this.horizontalGap + middleOffsetX,
              startY + this.verticalGap,
            ),
          ];
        }

        /**
         * 设置单个圆环颜色。
         *
         * @param {string|number} ringNameOrIndex 圆环名称，或圆环索引：0 蓝、1 黑、2 红、3 黄、4 绿。
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setRingColor(ringNameOrIndex, color) {
          const ringName =
            typeof ringNameOrIndex === "number"
              ? this.ringNames[ringNameOrIndex]
              : ringNameOrIndex;

          if (this.options.colors[ringName]) {
            this.options.colors[ringName] = color;
          }

          return this;
        }

        /**
         * 批量设置圆环颜色。
         *
         * @param {Partial<OlympicRingColors>} colors 需要覆盖的圆环颜色。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setRingColors(colors) {
          Object.entries(colors).forEach(([ringName, color]) =>
            this.setRingColor(ringName, color),
          );

          return this;
        }

        /**
         * 设置所有圆环为同一种颜色。
         *
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setAllRingColor(color) {
          this.ringNames.forEach((ringName) => {
            this.options.colors[ringName] = color;
          });

          return this;
        }

        /**
         * 设置画布背景色。
         *
         * @param {string} color CSS 颜色值。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        setBackgroundColor(color) {
          this.options.backgroundColor = color;
          return this;
        }

        /**
         * 根据当前五环尺寸自动调整画布大小。
         *
         * @param {HTMLCanvasElement} canvas 需要调整尺寸的 canvas 元素。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        resizeCanvas(canvas) {
          const rings = this.getRings();
          // 分别找到所有圆环中最大的圆心 X 和最大的圆心 Y；它们不一定来自同一个圆环。
          const maxCenterX = Math.max(...rings.map((ring) => ring.x));
          const maxCenterY = Math.max(...rings.map((ring) => ring.y));

          // 宽度用最大圆心 X 计算，高度用最大圆心 Y 计算，再分别加上外圈半径和右侧/底部留白。
          canvas.width = Math.ceil(
            maxCenterX + this.outerRadius + this.options.x,
          );
          canvas.height = Math.ceil(
            maxCenterY + this.outerRadius + this.options.y,
          );
          return this;
        }

        /**
         * 绘制奥运五环。
         *
         * @param {HTMLCanvasElement} canvas canvas 元素。
         * @returns {OlympicRings} 当前实例，便于链式调用。
         */
        draw(canvas) {
          const context = canvas.getContext("2d");

          context.clearRect(0, 0, canvas.width, canvas.height);
          context.fillStyle = this.options.backgroundColor;
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.lineWidth = this.lineWidth;
          context.lineCap = "round";

          const rings = this.getRings();
          rings.forEach((ring) => this.drawArc(context, ring, 0, Math.PI * 2));
          this.drawInterlacedArcs(context, rings);

          return this;
        }

        /**
         * 创建单个圆环的参数对象。
         *
         * @param {string} name 圆环名称。
         * @param {number} x 圆心 X 坐标。
         * @param {number} y 圆心 Y 坐标。
         * @returns {OlympicRing} 单个圆环参数。
         */
        createRing(name, x, y) {
          return {
            name,
            color: this.options.colors[name],
            x,
            y,
            radius: this.lineRadius,
            innerRadius: this.innerRadius,
            outerRadius: this.outerRadius,
          };
        }

        /**
         * 绘制指定圆环的一段圆弧。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing} ring 圆环参数。
         * @param {number} startAngle 起始角度，单位为弧度。
         * @param {number} endAngle 结束角度，单位为弧度。
         * @param {string|null} [debugColor=null] 调试颜色；为 null 时使用圆环原色。
         * @param {CanvasLineCap} [lineCap="round"] 线段端点样式。
         * @returns {void}
         */
        drawArc(
          ctx,
          ring,
          startAngle,
          endAngle,
          debugColor = null,
          lineCap = "round",
        ) {
          const originalLineCap = ctx.lineCap;

          ctx.lineCap = lineCap;
          ctx.strokeStyle = debugColor ?? ring.color;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.radius, startAngle, endAngle, false);
          ctx.stroke();
          ctx.lineCap = originalLineCap;
        }

        /**
         * 根据两个圆的交点，计算第一个圆上两个交点对应的角度。
         *
         * @param {OlympicRing} ring 圆环参数。
         * @param {OlympicRing} otherRing 与它相交的另一个圆环参数。
         * @returns {{ angle: number, x: number, y: number }[]} 两个交点在 ring 上对应的角度和坐标。
         */
        getIntersectionAngles(ring, otherRing) {
          const dx = otherRing.x - ring.x;
          const dy = otherRing.y - ring.y;
          const distance = Math.hypot(dx, dy);
          const radius = ring.radius;

          // 如果两个圆没有相交，或者圆心完全重合，就没有可用于补画的交点。
          if (distance === 0 || distance > radius * 2) {
            return [];
          }

          // 两个圆心连线的方向角。可以理解为：从 ring 圆心看向 otherRing 圆心的角度。
          const baseAngle = Math.atan2(dy, dx);

          // 两个圆半径相同，所以两个交点会对称分布在圆心连线两侧。
          // distance / 2 是圆心到“两个交点连线中点”的距离。
          // 用 cos(夹角) = 邻边 / 斜边 = (distance / 2) / radius，反推出夹角。
          const offsetAngle = Math.acos(distance / (2 * radius));

          // 第一个交点角度 = 圆心连线方向角 + 夹角；第二个交点角度 = 圆心连线方向角 - 夹角。
          return [baseAngle + offsetAngle, baseAngle - offsetAngle].map(
            (angle) => ({
              angle,
              // 角度转回坐标，方便后面按交点位置选择到底补画哪一个交点附近的弧。
              x: ring.x + Math.cos(angle) * radius,
              y: ring.y + Math.sin(angle) * radius,
            }),
          );
        }

        /**
         * 从两个交点里选择需要补画的那个交点角度。
         *
         * @param {OlympicRing} upperRing 需要压在上面的圆环。
         * @param {OlympicRing} lowerRing 被压在下面的圆环。
         * @param {"upper"|"lower"} pointPosition 选择更靠上的交点，还是更靠下的交点。
         * @returns {number|null} 需要补画的交点角度，单位为弧度；没有交点时返回 null。
         */
        getInterlacedArcAngle(upperRing, lowerRing, pointPosition) {
          const intersections = this.getIntersectionAngles(
            upperRing,
            lowerRing,
          );

          if (intersections.length === 0) {
            return null;
          }

          // Canvas 的 y 轴向下，所以 y 更小表示位置更靠上，y 更大表示位置更靠下。
          // 每组交错关系显式指定使用 upper 还是 lower，避免靠左右位置猜测导致黑绿这类交点选错。
          return intersections.toSorted((pointA, pointB) =>
            pointPosition === "upper"
              ? pointA.y - pointB.y
              : pointB.y - pointA.y,
          )[0].angle;
        }

        /**
         * 在两个圆环交点附近补画一小段上层圆环，形成相互交错的视觉效果。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing} upperRing 需要压在上面的圆环。
         * @param {OlympicRing} lowerRing 被压在下面的圆环。
         * @param {"upper"|"lower"} pointPosition 选择更靠上的交点，还是更靠下的交点。
         * @returns {void}
         */
        drawInterlacedArc(ctx, upperRing, lowerRing, pointPosition) {
          const angle = this.getInterlacedArcAngle(
            upperRing,
            lowerRing,
            pointPosition,
          );

          if (angle === null) {
            return;
          }

          // 补画弧线只需要覆盖交点附近的一小段。
          // this.lineWidth / this.lineRadius 得到的是“一整条线宽”对应的大致弧度；
          // 这里取一半作为左右两侧的基础半角，再加 15% 余量，避免刚好露边。
          // 补画时使用 butt 端点，避免 round 端点额外往两侧伸出半个线宽。
          const anglePadding = (this.lineWidth / this.lineRadius / 2) * 1.6;

          this.drawArc(
            ctx,
            upperRing,
            angle - anglePadding,
            angle + anglePadding,
            this.options.debugInterlacedColor,
            "butt",
          );
        }

        /**
         * 补画局部弧线，形成五环相互交错的视觉效果。
         *
         * @param {CanvasRenderingContext2D} ctx Canvas 2D 绘图上下文。
         * @param {OlympicRing[]} rings 五个圆环的参数列表。
         * @returns {void}
         */
        drawInterlacedArcs(ctx, rings) {
          const ringMap = Object.fromEntries(
            rings.map((ring) => [ring.name, ring]),
          );

          [
            // 完整圆环按 blue -> black -> red -> yellow -> green 绘制，
            // 所以下排的 yellow/green 默认已经盖住了上排圆环。
            // 这里只补画 4 个“上排圆环需要反过来盖住下排圆环”的交点。
            //
            // 每一项表示：在指定交点附近，upperRingName 这个环要盖在 lowerRingName 上面。
            // pointPosition 不是颜色含义，而是两个圆交点的空间位置：upper 表示更靠上的交点，lower 表示更靠下的交点。
            {
              upperRingName: "blue",
              lowerRingName: "yellow",
              pointPosition: "upper",
            },
            {
              upperRingName: "black",
              lowerRingName: "yellow",
              pointPosition: "lower",
            },
            {
              upperRingName: "black",
              lowerRingName: "green",
              pointPosition: "upper",
            },
            {
              upperRingName: "red",
              lowerRingName: "green",
              pointPosition: "lower",
            },
          ].forEach(({ upperRingName, lowerRingName, pointPosition }) => {
            this.drawInterlacedArc(
              ctx,
              ringMap[upperRingName],
              ringMap[lowerRingName],
              pointPosition,
            );
          });
        }
      }

      const canvas = document.getElementById("canvas-olympic-rings");
      const controlPanel = document.getElementById("rings-control-panel");
      const controlForm = document.getElementById("rings-control-form");
      const togglePanelButton = document.getElementById("toggle-panel");
      const resetControlsButton = document.getElementById("reset-controls");
      const applyAllColorButton = document.getElementById("apply-all-color");
      const initialOptions = {
        x: 25,
        y: 25,
        innerRadius: 100,
        // debugInterlacedColor: "pink",
      };
      const defaultOptions = {
        ...OlympicRings.defaultOptions,
        ...initialOptions,
        colors: {
          ...OlympicRings.defaultOptions.colors,
          ...initialOptions.colors,
        },
      };
      const olympicRings = new OlympicRings(defaultOptions);
      const numberControlNames = [
        "x",
        "y",
        "innerRadius",
        "innerRadiusRatio",
        "outerRadiusRatio",
        "horizontalGapRatio",
        "verticalGapRatio",
      ];
      const colorControlNames = ["backgroundColor", ...OlympicRings.ringNames];
      let renderFrameId = null;

      /**
       * 根据表单控件 name 获取对应的表单元素。
       *
       * @param {string} name 表单控件的 name。
       * @returns {Element|RadioNodeList} 对应的表单控件。
       */
      const getControl = (name) => controlForm.elements[name];

      /**
       * 判断字符串是否是 input[type="color"] 支持的十六进制颜色。
       *
       * @param {string} value 需要判断的颜色字符串。
       * @returns {boolean} 是合法 #rrggbb 颜色时返回 true。
       */
      const isHexColor = (value) => /^#[0-9a-f]{6}$/i.test(value);

      /**
       * 复制五环配置对象，并单独复制 colors，避免重置或修改时共享同一个颜色对象。
       *
       * @param {OlympicRingsOptions} options 需要复制的五环配置。
       * @returns {OlympicRingsOptions} 复制后的五环配置。
       */
      const cloneOptions = (options) => ({
        ...options,
        colors: { ...options.colors },
      });
      let currentOptions = cloneOptions(defaultOptions);

      /**
       * 同步某个数字参数的 range 输入框和 number 输入框。
       *
       * @param {string} name 参数名称。
       * @param {number|string} value 参数值。
       * @returns {void}
       */
      const setNumberControls = (name, value) => {
        getControl(name).value = value;
        getControl(`${name}Number`).value = value;
      };

      /**
       * 同步某个颜色参数的 color 输入框和文本输入框。
       *
       * @param {string} name 颜色参数名称。
       * @param {string} value CSS 十六进制颜色值。
       * @returns {void}
       */
      const setColorControls = (name, value) => {
        if (isHexColor(value)) {
          getControl(name).value = value;
        }

        getControl(`${name}Text`).value = value;
      };

      /**
       * 将当前配置写回控制面板，让重置或初始化后的 UI 与配置保持一致。
       *
       * @returns {void}
       */
      const syncControlsFromOptions = () => {
        numberControlNames.forEach((name) =>
          setNumberControls(name, currentOptions[name]),
        );
        setColorControls("backgroundColor", currentOptions.backgroundColor);
        OlympicRings.ringNames.forEach((name) =>
          setColorControls(name, currentOptions.colors[name]),
        );
        getControl("debugEnabled").checked = Boolean(
          currentOptions.debugInterlacedColor,
        );
        getControl("debugInterlacedColor").value =
          currentOptions.debugInterlacedColor ?? "#ff69b4";
      };

      /**
       * 按当前配置重新计算画布尺寸并绘制五环。
       *
       * @returns {void}
       */
      const render = () => {
        renderFrameId = null;
        olympicRings.options = cloneOptions(currentOptions);
        olympicRings.resizeCanvas(canvas).draw(canvas);
      };

      /**
       * 安排下一帧重绘。
       *
       * 控制面板的滑块会连续触发 input 事件，如果每次事件都立刻 resize + draw，
       * 浏览器可能在一帧内重复做多次无意义绘制。这里用 requestAnimationFrame
       * 把多次输入合并到下一帧，只保留一次真正的 render。
       *
       * @returns {void}
       */
      const scheduleRender = () => {
        if (renderFrameId !== null) {
          return;
        }

        renderFrameId = requestAnimationFrame(render);
      };

      /**
       * 更新一个数字配置项，并同步同组输入框后安排重绘。
       *
       * @param {string} name 数字配置项名称。
       * @param {string|number} value 来自表单的数字值。
       * @returns {void}
       */
      const updateNumberOption = (name, value) => {
        const numberValue = Number(value);

        if (!Number.isFinite(numberValue)) {
          return;
        }

        currentOptions[name] = numberValue;
        setNumberControls(name, value);
        scheduleRender();
      };

      /**
       * 更新一个颜色配置项，并同步同组输入框后安排重绘。
       *
       * @param {string} name 颜色配置项名称，backgroundColor 表示背景色，其它名称表示圆环颜色。
       * @param {string} value CSS 十六进制颜色值。
       * @returns {void}
       */
      const updateColorOption = (name, value) => {
        if (!isHexColor(value)) {
          getControl(`${name}Text`).value = value;
          return;
        }

        if (name === "backgroundColor") {
          currentOptions.backgroundColor = value;
        } else {
          currentOptions.colors[name] = value;
        }

        setColorControls(name, value);
        scheduleRender();
      };

      /**
       * 处理控制面板输入事件，并根据控件名称分发到对应的配置更新逻辑。
       *
       * @param {InputEvent} event 表单 input 事件。
       * @returns {void}
       */
      const handleControlInput = (event) => {
        const { name, value, checked } = event.target;

        if (numberControlNames.includes(name)) {
          updateNumberOption(name, value);
          return;
        }

        if (name.endsWith("Number")) {
          updateNumberOption(name.replace("Number", ""), value);
          return;
        }

        if (colorControlNames.includes(name)) {
          updateColorOption(name, value);
          return;
        }

        if (name.endsWith("Text")) {
          updateColorOption(name.replace("Text", ""), value);
          return;
        }

        if (name === "debugEnabled") {
          currentOptions.debugInterlacedColor = checked
            ? getControl("debugInterlacedColor").value
            : null;
          scheduleRender();
          return;
        }

        if (name === "debugInterlacedColor") {
          currentOptions.debugInterlacedColor = getControl("debugEnabled")
            .checked
            ? value
            : null;
          scheduleRender();
        }
      };

      /**
       * 将统一颜色应用到五个圆环，并同步五个颜色控件。
       *
       * @returns {void}
       */
      const handleApplyAllColor = () => {
        const color = getControl("allRingsColor").value;

        OlympicRings.ringNames.forEach((name) => {
          currentOptions.colors[name] = color;
          setColorControls(name, color);
        });
        scheduleRender();
      };

      /**
       * 将配置和控制面板恢复到初始状态。
       *
       * @returns {void}
       */
      const handleResetControls = () => {
        currentOptions = cloneOptions(defaultOptions);
        syncControlsFromOptions();
        scheduleRender();
      };

      /**
       * 切换右侧控制面板的展开和折叠状态。
       *
       * @returns {void}
       */
      const handleTogglePanel = () => {
        const isCollapsed = controlPanel.classList.toggle("is-collapsed");
        togglePanelButton.textContent = isCollapsed ? "‹" : "›";
        togglePanelButton.setAttribute(
          "aria-label",
          isCollapsed ? "展开控制面板" : "折叠控制面板",
        );
      };

      controlForm.addEventListener("input", handleControlInput);
      applyAllColorButton.addEventListener("click", handleApplyAllColor);
      resetControlsButton.addEventListener("click", handleResetControls);
      togglePanelButton.addEventListener("click", handleTogglePanel);

      syncControlsFromOptions();
      render();
    </script>
  </body>
</html>
